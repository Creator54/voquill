name: Release (auto)

# Orchestrator. On push to `main` releases to dev; push to `prod` releases the
# consumer-facing channel (CLI, Desktop, Docs); push to `enterprise` releases
# the enterprise channel (Desktop enterprise, Enterprise Admin, Enterprise
# Gateway). Detects which folders changed since the previous commit on that
# branch and invokes the per-component reusable workflows.
#
# Promotion: fast-forward merge `main` into `prod` or `enterprise` → this
# workflow runs on that branch and only the components that changed since
# the last release on that branch ship.

on:
  push:
    branches: [main, prod, enterprise]

concurrency:
  group: release-${{ github.ref_name }}-orchestrator
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  actions: write

jobs:
  detect:
    name: Detect changed folders
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.env.outputs.channel }}
      cli: ${{ steps.filter.outputs.cli }}
      desktop: ${{ steps.filter.outputs.desktop }}
      docs: ${{ steps.filter.outputs.docs }}
      enterprise_admin: ${{ steps.filter.outputs.enterprise_admin }}
      enterprise_gateway: ${{ steps.filter.outputs.enterprise_gateway }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve channel from branch
        id: env
        run: |
          case "${{ github.ref_name }}" in
            prod)       echo "channel=prod"       >> "$GITHUB_OUTPUT" ;;
            enterprise) echo "channel=enterprise" >> "$GITHUB_OUTPUT" ;;
            *)          echo "channel=dev"        >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            cli:
              - 'cli/**'
            desktop:
              - 'apps/desktop/**'
              - 'apps/windows-installer/**'
              - 'packages/**'
            docs:
              - 'apps/docs/**'
            enterprise_admin:
              - 'enterprise/admin/**'
              - 'packages/**'
            enterprise_gateway:
              - 'enterprise/gateway/**'
              - 'packages/**'


  desktop:
    name: Desktop
    needs: detect
    # Desktop is released on all three channels. The channel name matches the
    # reusable's release_env input directly (dev/prod/enterprise).
    if: needs.detect.outputs.desktop == 'true'
    uses: ./.github/workflows/_release-desktop-impl.yml
    with:
      release_env: ${{ needs.detect.outputs.channel }}
    secrets: inherit

